<!DOCTYPE html>
<html lang="zh-TW">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>祁煜 0306 生日快樂</title>
  <style>
    :root{
      --bg-gradient: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
      --accent-color: #7a5ba0;
      --glass: rgba(255,255,255,0.18);
      --glass-strong: rgba(0,0,0,0.35);
      --white: #fff;
    }

    body, html{
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: "PingFang TC","Microsoft JhengHei",sans-serif;
      background: var(--bg-gradient);
    }

    /* 影片/背景容器 */
    #media-container{
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* 敬請期待與倒數 */
    .coming-soon-box{
      text-align: center;
      z-index: 5;
      padding: 0 16px;
    }

    .coming-soon{
      color: var(--white);
      font-size: 3rem;
      font-weight: 800;
      text-shadow: 0 4px 15px rgba(0,0,0,0.25);
      letter-spacing: 4px;
      margin-bottom: 14px;
      line-height: 1.1;
    }

    #timer{
      color: var(--white);
      font-size: 1.9rem;
      font-weight: 800;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      text-shadow: 0 2px 10px rgba(0,0,0,0.25);
      background: var(--glass);
      padding: 10px 18px;
      border-radius: 999px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: inline-block;
    }

    /* 影片 (預設隱藏) */
    #bg-video{
      display: none;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.85);
    }

    /* 彈幕層 */
    #danmu-overlay{
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 80%;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }

    .danmu{
      position: absolute;
      white-space: nowrap;
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.55);
      animation: move linear forwards;
      will-change: transform;
    }

    @keyframes move{
      from{ transform: translateX(110vw); }
      to{ transform: translateX(-120%); }
    }

    /* 浮動彈幕開關按鈕 */
    .danmu-toggle{
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 30;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,0.35);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
    }

    .danmu-toggle:active{
      transform: translateY(1px);
    }

    /* 輸入介面 (RWD) */
    .ui-panel{
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      padding: 26px 18px;
      box-sizing: border-box;
      background: linear-gradient(transparent, var(--glass-strong));
      z-index: 20;
    }

    .input-group{
      display: flex;
      max-width: 560px;
      margin: 0 auto;
      gap: 10px;
    }

    input[type="text"]{
      flex: 1;
      padding: 12px 18px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.45);
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      outline: none;
      min-width: 0;
    }
    input::placeholder{ color: rgba(255,255,255,0.75); }

    button{
      padding: 10px 18px;
      border-radius: 999px;
      background: #fff;
      color: var(--accent-color);
      border: none;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
    }
    button:hover{ transform: translateY(-1px); box-shadow: 0 5px 15px rgba(0,0,0,0.18); }

    @media (max-width: 600px){
      .coming-soon{ font-size: 2.1rem; letter-spacing: 3px; }
      #timer{ font-size: 1.15rem; }
      .danmu{ font-size: 1.15rem; }
      .ui-panel{ padding: 20px 14px; }
      .danmu-toggle{ top: 10px; right: 10px; padding: 9px 12px; }
    }
  </style>
</head>
<body>

  <div id="media-container">
    <div id="countdown-ui" class="coming-soon-box">
      <div class="coming-soon">敬請祁待</div>
      <div id="timer">Loading...</div>
    </div>

    <video id="bg-video" muted loop playsinline>
      <!-- TODO: 換成你的影片檔 -->
      <source src="vdo.mp4" type="video/mp4">
    </video>
  </div>

  <div id="danmu-overlay"></div>

  <!-- 彈幕開關 -->
  <button id="danmuToggleBtn" class="danmu-toggle" type="button">彈幕：開</button>

  <div class="ui-panel">
    <div class="input-group">
      <input type="text" id="msgInput" placeholder="給祁煜的生日祝福..." maxlength="40" />
      <button id="sendBtn" type="button">發送</button>
    </div>
  </div>

<script type="module">
  // ---------- debug boot block ----------
  console.log("✅ module script loaded (debug bumper)");
  document.body.insertAdjacentHTML(
    "afterbegin",
    '<div id="__dbg_banner" style="position:fixed;top:8px;left:8px;z-index:9999;padding:6px 10px;background:#0008;color:#fff;border-radius:10px;font-size:12px">module ok</div>'
  );

  window.addEventListener("error", (e) => {
    console.error("❌ window error:", e.message, e.error);
    const el = document.getElementById("__dbg_banner");
    if (el) el.textContent = "window error: " + e.message;
  });
  window.addEventListener("unhandledrejection", (e) => {
    console.error("❌ unhandled rejection:", e.reason);
    const el = document.getElementById("__dbg_banner");
    if (el) el.textContent = "unhandled rejection";
  });
  // ---------- end debug boot block ----------

  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import {
    getDatabase, ref, push, onChildAdded, query, limitToLast
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

  // 03/15 才切換成影片（台灣時間）
  const VIDEO_SWITCH_AT = new Date("2026-03-15T00:00:00+08:00").getTime();

  const firebaseConfig = {
    apiKey: "AIzaSyCsXDi3XafLhOY0Bwq47s-_s-f3rwGJhAk",
    authDomain: "rafayel-c806e.firebaseapp.com",
    databaseURL: "https://rafayel-c806e-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rafayel-c806e",
    storageBucket: "rafayel-c806e.firebasestorage.app",
    messagingSenderId: "121278015626",
    appId: "1:121278015626:web:26ba3ca3be10b76b782573",
    measurementId: "G-9P3FJLDTNY"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, "blessings");

  // ===== DOM =====
  const countdownUI = document.getElementById("countdown-ui");
  const timerEl = document.getElementById("timer");
  const videoEl = document.getElementById("bg-video");

  const overlay = document.getElementById("danmu-overlay");
  const toggleBtn = document.getElementById("danmuToggleBtn");

  const input = document.getElementById("msgInput");
  const sendBtn = document.getElementById("sendBtn");

  // ===== 倒數/切換 =====
  let videoShown = false;

  function formatCountdown(diffMs) {
    const total = Math.max(0, diffMs);
    const d = Math.floor(total / (1000 * 60 * 60 * 24));
    const h = Math.floor((total % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((total % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((total % (1000 * 60)) / 1000);
    return `${d}天 ${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
  }

  async function showVideo() {
    if (videoShown) return;
    videoShown = true;

    countdownUI.style.display = "none";
    videoEl.style.display = "block";

    try {
      await videoEl.play();
    } catch (e) {
      console.warn("Autoplay blocked:", e);
    }
  }

  function updateCountdown() {
    const now = Date.now();
    const diff = VIDEO_SWITCH_AT - now;

    if (diff <= 0) {
      showVideo();
      return;
    }
    timerEl.innerText = formatCountdown(diff);
  }

  setInterval(updateCountdown, 1000);
  updateCountdown();

  // ===== 彈幕開關 =====
  let danmuVisible = true;

  function updateDanmuVisibility() {
    overlay.style.display = danmuVisible ? "block" : "none";
    toggleBtn.textContent = danmuVisible ? "彈幕：開" : "彈幕：關";
  }

  toggleBtn.addEventListener("click", () => {
    danmuVisible = !danmuVisible;
    updateDanmuVisibility();
  });

  updateDanmuVisibility();

  // ===== 彈幕 =====
  function createDanmu(text) {
    if (!text) return;

    const div = document.createElement("div");
    div.className = "danmu";
    div.textContent = text;

    const top = Math.random() * 70 + 5;
    const duration = 7 + Math.random() * 6;

    div.style.top = `${top}%`;
    div.style.animationDuration = `${duration}s`;

    const colors = ["#ffffff", "#fce4ec", "#e3f2fd", "#f3e5f5"];
    div.style.color = colors[Math.floor(Math.random() * colors.length)];

    overlay.appendChild(div);
    window.setTimeout(() => div.remove(), duration * 1000);
  }

  // 本地測試彈幕（確認 overlay OK）
  //createDanmu("測試彈幕：看到我代表畫面正常 ✨");
  //console.log("✅ local test danmu created");

  // ===== 文字清理 =====
  function sanitizeText(text) {
    return String(text || "").replace(/\s+/g, " ").trim();
  }

  // ✅ 只保留「一個」送出事件（這就是你要的）
  async function sendMessage() {
    const raw = input.value;
    const text = sanitizeText(raw);

    console.log("👉 raw:", raw);
    console.log("👉 click send:", text);

    if (!text) {
      console.log("空字串，略過送出");
      return;
    }

    try {
      await push(messagesRef, { content: text, time: Date.now() });
      console.log("✅ push ok");
      input.value = "";
    } catch (err) {
      console.error("❌ push failed:", err);
    }
  }

  sendBtn.addEventListener("click", sendMessage);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });

 

  // 背景切換時暫停/恢復
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      if (!videoEl.paused) videoEl.pause();
    } else {
      updateCountdown();
      if (videoShown && videoEl.paused) videoEl.play().catch(() => {});
    }
  });
  
  
  
  
// ========================
// 🎯 隨機彈幕輪播（最多20條）
// ========================

let danmuPool = [];
let danmuTimer = null;

const MAX_DANMU_COUNT = 20;   // 最多保留 20 條
const DANMU_INTERVAL = 2500;  // 每 2.5 秒一條（不會太密）

// 改寫資料讀取（只存，不直接播放）
const messagesQuery = query(messagesRef, limitToLast(50));

onChildAdded(messagesQuery, (data) => {
  const msg = data.val();
  if (!msg?.content) return;

  // 加入池子
  danmuPool.push(msg.content);

  // 超過 20 條就刪最舊的
  if (danmuPool.length > MAX_DANMU_COUNT) {
    danmuPool.shift();
  }
});

// 隨機播放
function startDanmuLoop() {
  if (danmuTimer) clearInterval(danmuTimer);

  danmuTimer = setInterval(() => {
    if (!danmuVisible) return;
    if (danmuPool.length === 0) return;

    const randomIndex = Math.floor(Math.random() * danmuPool.length);
    const text = danmuPool[randomIndex];

    createDanmu(text);

  }, DANMU_INTERVAL);
}

startDanmuLoop();

// 保底一條（避免畫面太空）
if (danmuPool.length === 0) {
  danmuPool.push("祁煜生日快樂 💙");
}
</script>

</body>
</html>
